version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itekane-app
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/education
    volumes:
      - storage-data:/srv/itekane-storage
    networks:
      - itekane-network
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: itekane-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - itekane-network
    environment:
      - MONGO_INITDB_DATABASE=education

